name: Notify Teams on published release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: windows-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}

    steps:
      - name: Send Teams release notification
        shell: pwsh
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PRODUCT_NAME: "SOMA Aware Dashboard"
          FRIENDLY_MESSAGE: "Check out this new version of the dashboard!"
        run: |
          $ErrorActionPreference = "Stop"

          $TeamsWebhookUrl = $env:TEAMS_WEBHOOK_URL
          $ProductName = $env:PRODUCT_NAME
          $FriendlyMessage = $env:FRIENDLY_MESSAGE

          if ([string]::IsNullOrWhiteSpace($TeamsWebhookUrl)) {
            throw "Missing TEAMS_WEBHOOK_URL."
          }

          if ([string]::IsNullOrWhiteSpace($ProductName)) {
            throw "Missing PRODUCT_NAME."
          }

          if ([string]::IsNullOrWhiteSpace($FriendlyMessage)) {
            $FriendlyMessage = "A new version is now available."
          }

          $Version = "v1.0.0-test"
          $ReleaseUrl = "https://github.com/"
          $Changelog = "### Added`n- Example added item`n- Example improvement`n`n### Fixed`n- Example bug fix"

          if ($env:GITHUB_EVENT_NAME -eq "release") {
            $githubEvent = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
            $release = $githubEvent.release

            $Version = $release.tag_name
            $ReleaseUrl = $release.html_url
            $Changelog = $release.body
          }

          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "Missing release version."
          }

          if ([string]::IsNullOrWhiteSpace($ReleaseUrl)) {
            throw "Missing release URL."
          }

          if ([string]::IsNullOrWhiteSpace($Changelog)) {
            $Changelog = "No changelog was provided for this release."
          }

          $Changelog = $Changelog -replace "`r`n", "`n"
          $Changelog = $Changelog -replace "`r", "`n"
          $Changelog = $Changelog.Trim()

          if ($Changelog.Length -gt 1200) {
            $Changelog = $Changelog.Substring(0, 1200) + "`n`n..."
          }

          function Add-TextBlock {
            param(
              [System.Collections.Generic.List[object]]$List,
              [string]$Text,
              [string]$Weight,
              [string]$Size,
              [string]$Spacing
            )

            $block = @{
              type = "TextBlock"
              text = $Text
              wrap = $true
            }

            if (-not [string]::IsNullOrWhiteSpace($Weight)) {
              $block.weight = $Weight
            }

            if (-not [string]::IsNullOrWhiteSpace($Size)) {
              $block.size = $Size
            }

            if (-not [string]::IsNullOrWhiteSpace($Spacing)) {
              $block.spacing = $Spacing
            }

            [void]$List.Add($block)
          }

          function Add-ChangelogBlocks {
            param(
              [System.Collections.Generic.List[object]]$List,
              [string]$Markdown
            )

            $lines = $Markdown.Split("`n")

            $sections = [System.Collections.Generic.List[object]]::new()
            $currentHeading = $null
            $currentLines = [System.Collections.Generic.List[string]]::new()

            foreach ($line in $lines) {
              if ($line -match '^[ \t]{0,3}#{1,6}[ \t]+(.+?)[ \t]*#*[ \t]*$') {
                if (($null -ne $currentHeading) -or ($currentLines.Count -gt 0)) {
                  [void]$sections.Add([pscustomobject]@{
                    Heading = $currentHeading
                    Lines = @($currentLines)
                  })
                  $currentLines.Clear()
                }

                $currentHeading = $matches[1].Trim()
              }
              elseif ([string]::IsNullOrWhiteSpace($line)) {
                continue
              }
              else {
                [void]$currentLines.Add($line.TrimEnd())
              }
            }

            if (($null -ne $currentHeading) -or ($currentLines.Count -gt 0)) {
              [void]$sections.Add([pscustomobject]@{
                Heading = $currentHeading
                Lines = @($currentLines)
              })
            }

            $sectionIndex = 0

            foreach ($section in $sections) {
              if (-not [string]::IsNullOrWhiteSpace($section.Heading)) {
                $spacing = "Medium"

                if ($sectionIndex -eq 0) {
                  $spacing = "Small"
                }

                Add-TextBlock `
                  -List $List `
                  -Text $section.Heading `
                  -Weight "Bolder" `
                  -Size "Medium" `
                  -Spacing $spacing

                $sectionIndex++
              }

              $sectionText = ($section.Lines -join "`n").Trim()

              if (-not [string]::IsNullOrWhiteSpace($sectionText)) {
                Add-TextBlock `
                  -List $List `
                  -Text $sectionText `
                  -Weight "" `
                  -Size "" `
                  -Spacing "None"
              }
            }
          }

          $cardBody = [System.Collections.Generic.List[object]]::new()

          Add-TextBlock `
            -List $cardBody `
            -Text "$ProductName $Version" `
            -Weight "Bolder" `
            -Size "Large" `
            -Spacing ""

          Add-TextBlock `
            -List $cardBody `
            -Text $FriendlyMessage `
            -Weight "" `
            -Size "" `
            -Spacing "Small"

          Add-TextBlock `
            -List $cardBody `
            -Text "Changelog" `
            -Weight "Bolder" `
            -Size "ExtraLarge" `
            -Spacing "Large"

          Add-ChangelogBlocks `
            -List $cardBody `
            -Markdown $Changelog

          $card = @{
            '$schema' = "http://adaptivecards.io/schemas/adaptive-card.json"
            type = "AdaptiveCard"
            version = "1.4"
            body = $cardBody
            actions = @(
              @{
                type = "Action.OpenUrl"
                title = "Open release"
                url = $ReleaseUrl
              }
            )
          }

          $payload = @{
            type = "message"
            text = "$ProductName $Version released"
            summary = "$ProductName $Version released"
            attachments = @(
              @{
                contentType = "application/vnd.microsoft.card.adaptive"
                contentUrl = $null
                content = $card
              }
            )
          }

          $body = $payload | ConvertTo-Json -Depth 20

          Invoke-RestMethod `
            -Uri $TeamsWebhookUrl `
            -Method Post `
            -ContentType "application/json; charset=utf-8" `
            -Body $body

          Write-Host "Teams release notification sent."
