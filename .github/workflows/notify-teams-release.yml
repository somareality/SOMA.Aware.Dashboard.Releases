name: Notify Teams on published release

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  notify:
    runs-on: windows-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}

    steps:
      - name: Send Teams release notification
        shell: powershell
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

          # Customize per tool/repo
          PRODUCT_NAME: "SOMA Aware Dashboard"
          FRIENDLY_MESSAGE: "Check out this new version of the dashboard!"

        run: |
          $ErrorActionPreference = "Stop"

          $TeamsWebhookUrl = $env:TEAMS_WEBHOOK_URL
          $ProductName = $env:PRODUCT_NAME
          $FriendlyMessage = $env:FRIENDLY_MESSAGE

          if ([string]::IsNullOrWhiteSpace($TeamsWebhookUrl)) {
            throw "Missing TEAMS_WEBHOOK_URL."
          }

          if ([string]::IsNullOrWhiteSpace($ProductName)) {
            throw "Missing PRODUCT_NAME."
          }

          if ([string]::IsNullOrWhiteSpace($FriendlyMessage)) {
            $FriendlyMessage = "A new version is now available."
          }

          # Defaults for manual workflow_dispatch testing
          $Version = "v1.0.0-test"
          $ReleaseUrl = "https://github.com/"
          $Changelog = @"
# Added

- Example added item
- Example improvement

# Fixed

- Example bug fix
"@

          # Real values for GitHub release runs
          if ($env:GITHUB_EVENT_NAME -eq "release") {
            $githubEvent = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
            $release = $githubEvent.release

            $Version = $release.tag_name
            $ReleaseUrl = $release.html_url
            $Changelog = $release.body
          }

          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "Missing release version."
          }

          if ([string]::IsNullOrWhiteSpace($ReleaseUrl)) {
            throw "Missing release URL."
          }

          if ([string]::IsNullOrWhiteSpace($Changelog)) {
            $Changelog = "No changelog was provided for this release."
          }

          # Make release-body headings smaller than the card's main Changelog header.
          # Example: "# Added" or "## Fixed" becomes "**Added**" / "**Fixed**".
          $Changelog = [regex]::Replace(
            $Changelog,
            '(?m)^\s{0,3}#{1,6}\s+(.+?)\s*#*\s*$',
            '**$1**'
          )

          # Keep Teams message readable
          if ($Changelog.Length -gt 1200) {
            $Changelog = $Changelog.Substring(0, 1200) + "`n`n..."
          }

          $card = @{
            '$schema' = "http://adaptivecards.io/schemas/adaptive-card.json"
            type = "AdaptiveCard"
            version = "1.4"
            body = @(
              @{
                type = "TextBlock"
                text = "$ProductName $Version"
                weight = "Bolder"
                size = "Large"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = $FriendlyMessage
                wrap = $true
                spacing = "Small"
              },
              @{
                type = "TextBlock"
                text = "Changelog"
                weight = "Bolder"
                size = "ExtraLarge"
                wrap = $true
                spacing = "Large"
              },
              @{
                type = "TextBlock"
                text = $Changelog
                wrap = $true
                spacing = "Small"
              }
            )
            actions = @(
              @{
                type = "Action.OpenUrl"
                title = "Open release"
                url = $ReleaseUrl
              }
            )
          }

          $payload = @{
            type = "message"
            attachments = @(
              @{
                contentType = "application/vnd.microsoft.card.adaptive"
                contentUrl = $null
                content = $card
              }
            )
          }

          $body = $payload | ConvertTo-Json -Depth 20

          Invoke-RestMethod `
            -Uri $TeamsWebhookUrl `
            -Method Post `
            -ContentType "application/json; charset=utf-8" `
            -Body $body

          Write-Host "Teams release notification sent."
