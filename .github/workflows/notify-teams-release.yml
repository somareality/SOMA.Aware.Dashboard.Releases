# .github/workflows/notify-teams-release.yml
name: Notify Teams on published release

on:
  release:
    types: [published]

  # Manual test button in GitHub Actions
  workflow_dispatch:

jobs:
  notify:
    runs-on: windows-latest

    # For release events, skip prereleases.
    # For manual workflow_dispatch tests, still allow the workflow to run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}

    steps:
      - name: Send Teams release notification
        shell: powershell
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PRODUCT_NAME: "Product name"
        run: |
          $ErrorActionPreference = "Stop"

          $TeamsWebhookUrl = $env:TEAMS_WEBHOOK_URL
          $ProductName = $env:PRODUCT_NAME

          if ([string]::IsNullOrWhiteSpace($TeamsWebhookUrl)) {
            throw "Missing TEAMS_WEBHOOK_URL."
          }

          if ([string]::IsNullOrWhiteSpace($ProductName)) {
            throw "Missing PRODUCT_NAME."
          }

          # Defaults for manual test runs
          $Version = "v1.0.0-test"
          $ReleaseUrl = "https://github.com/"
          $Changelog = "This is a test release notification from GitHub Actions."

          # Real values for GitHub release runs
          if ($env:GITHUB_EVENT_NAME -eq "release") {
            $githubEvent = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
            $release = $githubEvent.release

            $Version = $release.tag_name
            $ReleaseUrl = $release.html_url
            $Changelog = $release.body
          }

          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "Missing release version."
          }

          if ([string]::IsNullOrWhiteSpace($ReleaseUrl)) {
            throw "Missing release URL."
          }

          if ([string]::IsNullOrWhiteSpace($Changelog)) {
            $Changelog = "No changelog was provided for this release."
          }

          # Keep the Teams message readable
          if ($Changelog.Length -gt 1200) {
            $Changelog = $Changelog.Substring(0, 1200) + "`n`n..."
          }

          $card = @{
            '$schema' = "http://adaptivecards.io/schemas/adaptive-card.json"
            type = "AdaptiveCard"
            version = "1.4"
            body = @(
              @{
                type = "TextBlock"
                text = "New release available"
                weight = "Bolder"
                size = "Large"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = "$ProductName $Version"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = "A new version of $ProductName is now available."
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = "Changelog"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = $Changelog
                wrap = $true
              }
            )
            actions = @(
              @{
                type = "Action.OpenUrl"
                title = "Open release"
                url = $ReleaseUrl
              }
            )
          }

          $payload = @{
            type = "message"
            attachments = @(
              @{
                contentType = "application/vnd.microsoft.card.adaptive"
                contentUrl = $null
                content = $card
              }
            )
          }

          $body = $payload | ConvertTo-Json -Depth 20

          Write-Host "Sending payload with root type:"
          Write-Host $payload.type

          Write-Host "Sending attachment content type:"
          Write-Host $payload.attachments[0].content.type

          Write-Host "Payload preview:"
          Write-Host $body

          try {
            Invoke-RestMethod `
              -Uri $TeamsWebhookUrl `
              -Method Post `
              -ContentType "application/json; charset=utf-8" `
              -Body $body

            Write-Host "Teams release notification sent."
          } catch {
            $response = $_.Exception.Response
            if ($response -and $response.GetResponseStream()) {
              $reader = [System.IO.StreamReader]::new($response.GetResponseStream())
              $errorBody = $reader.ReadToEnd()
              if ($errorBody) {
                Write-Error "Teams webhook request failed with HTTP $([int]$response.StatusCode): $errorBody"
              }
            }

            throw
          }
