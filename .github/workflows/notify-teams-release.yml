# .github/workflows/notify-teams-release.yml
name: Notify Teams on published release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: windows-latest

    # Optional: skip prereleases if you only want stable user-facing updates
    if: ${{ github.event.release.prerelease == false }}

    steps:
      - name: Send Teams release notification
        shell: pwsh
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

          # Customize this per release-hosting repo/tool
          PRODUCT_NAME: "Product name"

          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          $ErrorActionPreference = "Stop"

          $TeamsWebhookUrl = $env:TEAMS_WEBHOOK_URL
          $ProductName = $env:PRODUCT_NAME
          $Version = $env:RELEASE_TAG
          $ReleaseUrl = $env:RELEASE_URL
          $Changelog = $env:RELEASE_BODY

          if ([string]::IsNullOrWhiteSpace($TeamsWebhookUrl)) {
            throw "Missing TEAMS_WEBHOOK_URL."
          }

          if ([string]::IsNullOrWhiteSpace($ProductName)) {
            throw "Missing PRODUCT_NAME."
          }

          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "Missing RELEASE_TAG."
          }

          if ([string]::IsNullOrWhiteSpace($ReleaseUrl)) {
            throw "Missing RELEASE_URL."
          }

          if ([string]::IsNullOrWhiteSpace($Changelog)) {
            $Changelog = "No changelog was provided for this release."
          }

          # Keep Teams chat readable and avoid oversized cards
          if ($Changelog.Length -gt 1200) {
            $Changelog = $Changelog.Substring(0, 1200) + "`n`n…"
          }

          $card = @{
            '$schema' = "http://adaptivecards.io/schemas/adaptive-card.json"
            type = "AdaptiveCard"
            version = "1.4"
            body = @(
              @{
                type = "TextBlock"
                text = "🚀 New release available"
                weight = "Bolder"
                size = "Large"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = "$ProductName $Version"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
                spacing = "Small"
              },
              @{
                type = "TextBlock"
                text = "A new version of **$ProductName** is now available."
                wrap = $true
                spacing = "Small"
              },
              @{
                type = "FactSet"
                spacing = "Medium"
                facts = @(
                  @{
                    title = "Product"
                    value = $ProductName
                  },
                  @{
                    title = "Version"
                    value = $Version
                  }
                )
              },
              @{
                type = "TextBlock"
                text = "What changed"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
                spacing = "Medium"
              },
              @{
                type = "TextBlock"
                text = $Changelog
                wrap = $true
                spacing = "Small"
              }
            )
            actions = @(
              @{
                type = "Action.OpenUrl"
                title = "Open release"
                url = $ReleaseUrl
              }
            )
          }

          $payload = @{
            type = "message"
            attachments = @(
              @{
                contentType = "application/vnd.microsoft.card.adaptive"
                contentUrl = $null
                content = $card
              }
            )
          }

          $body = $payload | ConvertTo-Json -Depth 20

          try {
            Invoke-RestMethod `
              -Uri $TeamsWebhookUrl `
              -Method Post `
              -ContentType "application/json; charset=utf-8" `
              -Body $body

            Write-Host "Teams release notification sent."
          } catch {
            $response = $_.Exception.Response
            if ($response -and $response.GetResponseStream()) {
              $reader = [System.IO.StreamReader]::new($response.GetResponseStream())
              $errorBody = $reader.ReadToEnd()
              if ($errorBody) {
                Write-Error "Teams webhook request failed with HTTP $([int]$response.StatusCode): $errorBody"
              }
            }

            throw
          }
