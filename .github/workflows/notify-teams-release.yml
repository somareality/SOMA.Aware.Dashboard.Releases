# .github/workflows/notify-teams-release.yml
name: Notify Teams on published release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: windows-latest

    # Remove this line if you also want prereleases to notify users
    if: ${{ github.event.release.prerelease == false }}

    steps:
      - name: Send Teams release notification
        shell: pwsh
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

          # Customize this per public release repo/tool
          PRODUCT_NAME: "Product name"
        run: |
          $ErrorActionPreference = "Stop"

          $TeamsWebhookUrl = $env:TEAMS_WEBHOOK_URL
          $ProductName = $env:PRODUCT_NAME

          if ([string]::IsNullOrWhiteSpace($TeamsWebhookUrl)) {
            throw "Missing TEAMS_WEBHOOK_URL."
          }

          if ([string]::IsNullOrWhiteSpace($ProductName)) {
            throw "Missing PRODUCT_NAME."
          }

          # Read GitHub release event payload directly
          $githubEvent = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
          $release = $githubEvent.release

          $Version = $release.tag_name
          $ReleaseUrl = $release.html_url
          $Changelog = $release.body

          if ([string]::IsNullOrWhiteSpace($Version)) {
            throw "Missing release tag."
          }

          if ([string]::IsNullOrWhiteSpace($ReleaseUrl)) {
            throw "Missing release URL."
          }

          if ([string]::IsNullOrWhiteSpace($Changelog)) {
            $Changelog = "No changelog was provided for this release."
          }

          # Keep Teams card readable and below webhook size limits
          if ($Changelog.Length -gt 1200) {
            $Changelog = $Changelog.Substring(0, 1200) + "`n`n..."
          }

          $card = @{
            '$schema' = "http://adaptivecards.io/schemas/adaptive-card.json"
            type = "AdaptiveCard"
            version = "1.4"
            body = @(
              @{
                type = "TextBlock"
                text = "🚀 New release available"
                weight = "Bolder"
                size = "Large"
                wrap = $true
              },
              @{
                type = "TextBlock"
                text = "$ProductName $Version"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
                spacing = "Small"
              },
              @{
                type = "TextBlock"
                text = "A new version of **$ProductName** is now available."
                wrap = $true
                spacing = "Small"
              },
              @{
                type = "FactSet"
                spacing = "Medium"
                facts = @(
                  @{
                    title = "Product"
                    value = $ProductName
                  },
                  @{
                    title = "Version"
                    value = $Version
                  }
                )
              },
              @{
                type = "TextBlock"
                text = "What changed"
                weight = "Bolder"
                size = "Medium"
                wrap = $true
                spacing = "Medium"
              },
              @{
                type = "TextBlock"
                text = $Changelog
                wrap = $true
                spacing = "Small"
              }
            )
            actions = @(
              @{
                type = "Action.OpenUrl"
                title = "Open release"
                url = $ReleaseUrl
              }
            )
          }

          # This wrapper is required by the Teams Workflow webhook
          $payload = @{
            type = "message"
            attachments = @(
              @{
                contentType = "application/vnd.microsoft.card.adaptive"
                contentUrl = $null
                content = $card
              }
            )
          }

          $body = $payload | ConvertTo-Json -Depth 20

          # Debug: show the payload shape without exposing the webhook URL
          Write-Host "Payload being sent to Teams:"
          Write-Host $body

          Invoke-RestMethod `
            -Uri $TeamsWebhookUrl `
            -Method Post `
            -ContentType "application/json; charset=utf-8" `
            -Body $body

          Write-Host "Teams release notification sent."
